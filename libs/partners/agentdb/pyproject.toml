[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "langchain-agentdb"
version = "0.1.0"
description = "An integration package connecting AgentDB and LangChain"
license = { text = "MIT" }
readme = "README.md"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
requires-python = ">=3.10.0,<4.0.0"
dependencies = [
    "langchain-core>=1.2.22,<2.0.0",
    "httpx>=0.27.0,<1.0.0",
]

[project.urls]
Homepage = "https://agentdb.dev"
Documentation = "https://agentdb.dev/docs"
Repository = "https://github.com/langchain-ai/langchain"
Issues = "https://github.com/langchain-ai/langchain/issues"

[dependency-groups]
test = [
    "pytest>=9.0.3,<10.0.0",
    "pytest-mock>=3.10.0,<4.0.0",
    "pytest-watcher>=0.3.4,<1.0.0",
    "pytest-asyncio>=1.3.0,<2.0.0",
    "freezegun>=1.2.2,<2.0.0",
    "syrupy>=5.0.0,<6.0.0",
    "langchain-core",
    "langchain-tests",
]
lint = ["ruff>=0.13.1,<0.14.0"]
dev = ["langchain-core"]
test_integration = []
typing = [
    "mypy>=1.10.0,<2.0.0",
    "langchain-core",
]

[tool.uv]
constraint-dependencies = ["pygments>=2.20.0"]

[tool.uv.sources]
langchain-core = { path = "../../core", editable = true }
langchain-tests = { path = "../../standard-tests", editable = true }

[tool.mypy]
disallow_untyped_defs = "True"

[tool.ruff.format]
docstring-code-format = true

[tool.ruff.lint]
select = [
    "A", "ASYNC", "C4", "COM", "D", "E", "EM", "F", "FA", "FBT",
    "FLY", "I", "ICN", "INT", "ISC", "PGH", "PIE", "PERF", "PYI",
    "Q", "RET", "RSE", "RUF", "S", "SLF", "SLOT", "SIM", "T10",
    "T20", "TID", "UP", "W", "YTT",
]
ignore = [
    "COM812", "ISC001", "PERF203", "S112", "RUF012", "SLF001",
]
unfixable = ["B028"]

[tool.coverage.run]
omit = ["tests/*"]

[tool.pytest.ini_options]
addopts = "--strict-markers --strict-config --durations=5"
markers = [
    "requires: mark tests as requiring a specific library",
    "compile: mark placeholder test used to compile integration tests without running them",
]
asyncio_mode = "auto"

[tool.ruff.lint.pydocstyle]
convention = "google"
ignore-var-parameters = true

[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports = "all"

[tool.ruff.lint.extend-per-file-ignores]
"tests/**/*.py" = [
    "S101",
    "S311",
]
"scripts/*.py" = [
    "INP001",
]
