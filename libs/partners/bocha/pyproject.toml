[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"

[project]
name = "langchain-bocha"
version = "0.1.0"
description = "LangChain integration for Bocha AI"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
dependencies = [
    "langchain-core>=0.3.0",
    "langchain-openai>=0.3.0",
    "requests>=2.28.0",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "langchain-tests"]

[tool.pdm.dev-dependencies]
test = ["pytest", "pytest-asyncio", "langchain-tests"]

[project.urls]
Homepage = "https://github.com/langchain-ai/langchain"

[tool.pytest.ini_options]
addopts = "--strict-markers --strict-config"
