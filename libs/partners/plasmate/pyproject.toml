[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "langchain-plasmate"
version = "0.1.0"
description = "LangChain integration for Plasmate - browse the web with 10x fewer tokens using SOM"
license = { text = "MIT" }
readme = "README.md"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
requires-python = ">=3.11.0,<4.0.0"
dependencies = [
    "langchain-core>=1.0.0,<2.0.0",
    "som-parser>=0.3.0",
]

[project.urls]
Homepage = "https://plasmate.app"
Documentation = "https://plasmate.app/docs/integration-langchain"
Repository = "https://github.com/plasmate-labs/plasmate"
"Source Code" = "https://github.com/langchain-ai/langchain/tree/master/libs/partners/plasmate"

[tool.mypy]
disallow_untyped_defs = true

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.pytest.ini_options]
addopts = "--snapshot-update --strict-markers --strict-config --durations=5"
markers = ["requires: mark tests as requiring a specific library"]
asyncio_mode = "auto"
