[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "langchain-mercatai"
version = "0.1.0"
description = "An integration package connecting Mercatai and LangChain"
license = { text = "MIT" }
readme = "README.md"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
requires-python = ">=3.10.0,<4.0.0"
dependencies = [
    "langchain-core>=0.1",
    "mercatai-agent>=0.1.0",
]

[project.urls]
Homepage = "https://mercatai.eu"
"Source Code" = "https://github.com/wptngnjkwb-dotcom/mercatai-agent-python"
"Release Notes" = "https://github.com/wptngnjkwb-dotcom/mercatai-agent-python/releases"

[tool.hatch.build.targets.wheel]
packages = ["langchain_mercatai"]
